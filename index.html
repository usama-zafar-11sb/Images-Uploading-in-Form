<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Image Upload</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <div class="upload-card">
      <div class="header">
        <h1>Upload Image</h1>
        <p>Enhance your profile with a stunning visual</p>
      </div>

      <form id="upload-form">
        <label for="image-input" class="drop-zone" id="drop-zone">
          <div class="drop-zone-content">
            <div class="upload-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <span class="drop-zone-text">Click or drag & drop image here</span>
            <span class="drop-zone-hint">Supports: JPG, PNG, WEBP</span>
          </div>
          <input
            type="file"
            id="image-input"
            accept="image/*"
            onchange="previewImage()"
            hidden
          />
          <div class="image-preview" id="image-preview">
            <img
              id="preview-img"
              src=""
              alt="Image Preview"
              style="display: none"
            />
          </div>
        </label>

        <button type="submit" class="submit-btn">
          <span>Upload Now</span>
          <div class="btn-shine"></div>
        </button>
      </form>
    </div>
    <script src="index.js"></script>
  </body>
</html>
